# PHP CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/language-php/ for more details
#
version: 2

jobs:
  "symfony7":
    docker:
      - image: aimeos/ci-php:8.3
      - image: cimg/mariadb:11.8
        environment:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: symfony
          MYSQL_USER: aimeos
          MYSQL_PASSWORD: aimeos
    steps:
      - checkout
      - run: wget https://getcomposer.org/download/latest-stable/composer.phar -O composer
      - restore_cache:
          keys:
            - php83-{{ checksum "composer.json" }}
      - run: php composer update -n --prefer-dist
      - save_cache:
          key: php83-{{ checksum "composer.json" }}
          paths: [./vendor]
      - run: for i in `seq 1 10`; do nc -z 127.0.0.1 3306 && echo OK && exit 0; echo -n .; sleep 1; done
      - run: ./vendor/bin/phpunit --coverage-clover coverage.xml

  "symfony8":
    docker:
      - image: aimeos/ci-php:8.5
      - image: cimg/mariadb:12.1
        environment:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: symfony
          MYSQL_USER: aimeos
          MYSQL_PASSWORD: aimeos
    steps:
      - checkout
      - run: wget https://getcomposer.org/download/latest-stable/composer.phar -O composer
      - restore_cache:
          keys:
            - php85-{{ checksum "composer.json" }}
      - run: php composer update -n --prefer-dist
      - save_cache:
          key: php85-{{ checksum "composer.json" }}
          paths: [./vendor]
      - run: for i in `seq 1 10`; do nc -z 127.0.0.1 3306 && echo OK && exit 0; echo -n .; sleep 1; done
      - run: ./vendor/bin/phpunit --coverage-clover coverage.xml

workflows:
  version: 2
  unittest:
    jobs:
      - "symfony7"
      - "symfony8"
